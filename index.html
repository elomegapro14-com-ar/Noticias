<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Canal - Noticias y Curiosidades</title>
    <style>
        /* Estilos del Preloader (sin cambios) */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #preloader img {
            width: 150px;
            height: auto;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Estilos básicos de la página */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 2rem 1rem; /* Aumentado el padding vertical */
            text-align: center;
            display: flex; /* Usamos Flexbox para alinear */
            justify-content: center; /* Centramos el contenido horizontalmente */
            align-items: center; /* Centramos verticalmente (opcional, ajustado por margen) */
            gap: 15px; /* Espacio entre la flecha y el texto */
        }

        /* Nuevo estilo para el contenedor del título */
        .title-container {
            display: flex;
            align-items: flex-start; /* Alinea la flecha arriba a la izquierda */
            text-align: left; /* Alinea el texto a la izquierda dentro del contenedor */
        }

        /* Estilo para la nueva flecha */
        header .arrow-gif {
            width: 50px; /* Tamaño de la flecha, ajústalo si es necesario */
            height: auto;
            margin-bottom: 0.5rem; /* Pequeño ajuste para que no toque el texto */
        }

        header h1 {
            margin: 0; /* Quitamos márgenes por defecto */
            font-size: 2.5rem;
        }

        main {
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="preloader">
        <img src="My Project5-10-2026_17-15-31.gif" alt="Cargando...">
    </div>

    <header>
        <div class="title-container">
            <img src="image_3.png" alt="Flecha" class="arrow-gif"> 
            <h1>Noticias y Curiosidades</h1>
        </div>
    </header>

    <main>
        <section class="card">
            <h2>Última Noticia</h2>
            <p>¡Bienvenidos a la base de mi sitio web! Aquí subiré todas las novedades del canal.</p>
        </section>

        <section class="card">
            <h2>¿Sabías que...?</h2>
            <p>Pronto habrá nuevas secciones de curiosidades y códigos interesantes.</p>
        </section>
    </main>

    <script>
        window.addEventListener('load', function() {
            const preloader = document.getElementById('preloader');
            setTimeout(() => {
                preloader.classList.add('hidden');
            }, 1000);
        });
    </script>

</body>
</html>
